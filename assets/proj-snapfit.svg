<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="204" viewBox="0 0 1000 204" role="img"><rect x="1" y="1" width="998" height="202" rx="12" fill="#161B22" stroke="#30363D"/><text x="32" y="56" font-family="'Segoe UI',Inter,system-ui,-apple-system,Arial,sans-serif" font-size="26" font-weight="700" fill="#F0F3F6">SnapFit</text><rect x="875" y="34" width="93" height="26" rx="13" fill="#241833" stroke="#C084FC"/><circle cx="890" cy="47" r="3.5" fill="#C084FC"/><text x="899" y="51" font-family="'Segoe UI',Inter,system-ui,-apple-system,Arial,sans-serif" font-size="11.5" font-weight="700" letter-spacing="1.2" fill="#C084FC">FEATURED</text><text x="32" y="90" font-family="'Segoe UI',Inter,system-ui,-apple-system,Arial,sans-serif" font-size="17" font-weight="600" fill="#818CF8">A fitting room that lives in your camera.</text><text x="32" y="122" font-family="'Segoe UI',Inter,system-ui,-apple-system,Arial,sans-serif" font-size="14.5" fill="#C9D1D9">On-device webcam body-scan that estimates a shopper's t-shirt size across 15+ brands — the</text><text x="32" y="144" font-family="'Segoe UI',Inter,system-ui,-apple-system,Arial,sans-serif" font-size="14.5" fill="#C9D1D9">photo never leaves the device. Built to cut the online-return waste from inconsistent sizing.</text><rect x="32" y="168" width="96" height="24" rx="12" fill="#0D1117" stroke="#30363D"/><text x="80" y="184.3" text-anchor="middle" font-family="'Segoe UI',Inter,system-ui,-apple-system,Arial,sans-serif" font-size="12.5" font-weight="600" fill="#818CF8">TypeScript</text><rect x="136" y="168" width="131" height="24" rx="12" fill="#0D1117" stroke="#30363D"/><text x="201.5" y="184.3" text-anchor="middle" font-family="'Segoe UI',Inter,system-ui,-apple-system,Arial,sans-serif" font-size="12.5" font-weight="600" fill="#818CF8">Computer Vision</text><rect x="275" y="168" width="61" height="24" rx="12" fill="#0D1117" stroke="#30363D"/><text x="305.5" y="184.3" text-anchor="middle" font-family="'Segoe UI',Inter,syste